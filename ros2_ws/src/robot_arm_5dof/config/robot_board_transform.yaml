# Board-to-robot coordinate transform for robot_arm_5dof
#
# Goal: convert board coordinates (cm) → robot base coordinates (m)
#
# Transform:
#   dx = board_x_cm - robot_base_x_board_cm
#   dy = board_y_cm - robot_base_y_board_cm
#   apply optional yaw_offset_deg around robot base
#   convert cm to meters
#
# Current values are provisional physical measurements for Phase 4.
#
# Board frame convention:
#   Origin = top-left outer corner of checkerboard
#   X_board = rightward
#   Y_board = downward
#
# Robot frame convention:
#   Origin = robot base center
#   Robot faces toward positive board Y direction
#   Z_robot = upward
#
# Units:
#   input board coordinates are centimeters
#   output robot coordinates are meters

board_to_robot:
  # Provisional measured position of robot base relative to board origin (cm)
  robot_base_x_board_cm: 13.5
  robot_base_y_board_cm: -8.5

  # Physical orientation note. Yaw offset remains configurable until validated.
  robot_forward_direction_on_board: positive_y

  # Yaw offset: rotation of robot frame relative to board frame (degrees)
  # 0 = use board-axis delta directly after subtracting base position
  robot_yaw_offset_deg: 0.0

  # Units
  units_input: cm
  units_output: meter

  status: provisional
  note: yaw offset and transform must be physically validated before robot motion

  # Optional: explicit rotation matrix elements (replace yaw_offset_deg if needed)
  # Set rot_00, rot_01, rot_10, rot_11 to non-null values to use matrix form instead
  rot_00: null                    # rotation matrix [0][0]
  rot_01: null                    # rotation matrix [0][1]
  rot_10: null                    # rotation matrix [1][0]
  rot_11: null                    # rotation matrix [1][1]

  # Workspace boundary in robot frame (m)
  # Used by IK controller to reject out-of-reach targets
  workspace_max_reach_m: 0.35     # conservative estimate, refine after calibration
  workspace_min_z_m: 0.02         # minimum safe height above board
  workspace_max_z_m: 0.30         # maximum height, keep gripper above board surface
