# Board-to-robot coordinate transform for robot_arm_5dof
#
# Goal: convert board coordinates (cm) → robot base coordinates (m)
#
# Transform:
#   dx = board_x_cm - robot_base_x_board_cm
#   dy = board_y_cm - robot_base_y_board_cm
#   apply optional yaw_offset_deg around robot base
#   convert cm to meters
#
# Current values are provisional physical measurements for Phase 4.
#
# Board frame convention:
#   Origin = top-left outer corner of checkerboard
#   X_board = rightward
#   Y_board = downward
#
# Robot frame convention:
#   Origin = robot base center
#   Robot base is centered above the checkerboard and outside the top edge.
#   Geometrically the board center lies along board Y+ from the robot base,
#   but the current transform implementation uses yaw sign convention where
#   -90 deg maps board Y+ to positive robot X.
#   Z_robot = upward
#
# Units:
#   input board coordinates are centimeters
#   output robot coordinates are meters

board_to_robot:
  # Measured position of robot base relative to actual printed board origin (cm)
  robot_base_x_board_cm: 14.25
  robot_base_y_board_cm: -9.0

  # Physical orientation note. Robot and camera face each other across the checkerboard.
  # Geometrically, board center from robot base is approximately dx=0, dy=18.
  # In the current transform sign convention, yaw -90 deg maps that board Y+
  # direction to positive robot X.
  robot_forward_direction_on_board: faces_board_center

  # Yaw offset: rotation of robot frame relative to board frame (degrees)
  # Current measured-sign-validated value: -90 deg
  robot_yaw_offset_deg: -90.0

  # Units
  units_input: cm
  units_output: meter

  status: measured_initial_sign_validated
  note: "Robot base centered above actual printed board, 9 cm outside top edge. Current transform convention requires yaw -90 deg so board center maps to positive robot X."

  # Qualitative transform test points for manual validation
  test_points_board_cm:
    center:
      x: 14.25
      y: 9.0
      expected_robot_x_m_approx: 0.18
      expected_robot_y_m_approx: 0.0
    left_center:
      x: 7.125
      y: 9.0
      expected_robot_x_m_similar_to_center: true
      expected_robot_y_sign: positive
    right_center:
      x: 21.375
      y: 9.0
      expected_robot_x_m_similar_to_center: true
      expected_robot_y_sign: negative

  # Optional: explicit rotation matrix elements (replace yaw_offset_deg if needed)
  # Set rot_00, rot_01, rot_10, rot_11 to non-null values to use matrix form instead
  rot_00: null                    # rotation matrix [0][0]
  rot_01: null                    # rotation matrix [0][1]
  rot_10: null                    # rotation matrix [1][0]
  rot_11: null                    # rotation matrix [1][1]

  # Workspace boundary in robot frame (m)
  # Used by IK controller to reject out-of-reach targets
  workspace_max_reach_m: 0.35     # conservative estimate, refine after calibration
  workspace_min_z_m: 0.02         # minimum safe height above board
  workspace_max_z_m: 0.30         # maximum height, keep gripper above board surface
