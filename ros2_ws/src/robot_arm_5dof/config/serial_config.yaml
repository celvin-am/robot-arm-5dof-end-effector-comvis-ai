serial:
  baud_rate: 115200
  default_port: null
  require_confirmation_for_home: true
  require_send_flag_for_motion_tools: true
  require_home_first_for_live_ik_motion: true
  require_risk_acknowledgement: true
  live_motion_risk_flag: --yes-i-understand-hardware-risk
  manual_validation_tcp_offset_mode: none
  allowed_phase6_commands:
    - PING
    - STATUS
    - LIMITS
    - HOME
    - STOP
    - HELP
  note: Software-only validation so far. Phase 6 allows HOME_SAFE only; no pick/place or IK target motion.
