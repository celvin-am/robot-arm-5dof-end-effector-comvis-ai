# Robot kinematics configuration for robot_arm_5dof
#
# This file contains:
#   - Modified DH table (initial baseline, must be validated against physical robot)
#   - Link lengths (meters)
#   - Workspace geometry
#   - IK solver parameters
#   - J5 wrist pitch compensation
#
# DH Reference (from uas.docx, uncalibrated baseline):
#   Link | a_i(cm) | alpha_i(deg) | d_i(cm)  | theta_i
#   -----|---------|--------------|----------|----------------
#   1    | 0       | 0            | 5        | theta1
#   2    | 0       | 90           | 5.5      | theta2 + 90°
#   3    | 12.5    | -180         | 0        | theta3 - 90°
#   4    | 0       | 90           | 9        | theta4
#   5    | 0       | -90          | 3        | theta5 - 90°
#
# IMPORTANT: These are baseline values. Validate against physical robot before use.

kinematics:
  # DH link lengths in meters (from baseline, uncalibrated)
  link_lengths:
    d1: 0.050       # base height (shoulder pivot to base rotation axis)
    d2: 0.055       # shoulder offset (shoulder pivot to elbow pivot)
    a3: 0.125       # upper arm length (elbow to wrist yaw pivot)
    d4: 0.090       # forearm length (wrist yaw to wrist pitch pivot)
    d5: 0.030       # wrist pitch to tool center point (TCP)

  # Total arm reach from base to TCP (approximate, compute from links)
  # total_reach_m: ~0.350  # d1+d2+a3+d4+d5 (verify)

  # DH table in meters (structured for FK implementation)
  dh_table:
    - link: 1
      a_m: 0.0
      alpha_rad: 0.0
      d_m: 0.050
      theta_offset_deg: 0
    - link: 2
      a_m: 0.0
      alpha_rad: 1.570796  # 90°
      d_m: 0.055
      theta_offset_deg: 90
    - link: 3
      a_m: 0.125
      alpha_rad: -3.141593  # -180°
      d_m: 0.0
      theta_offset_deg: -90
    - link: 4
      a_m: 0.0
      alpha_rad: 1.570796  # 90°
      d_m: 0.090
      theta_offset_deg: 0
    - link: 5
      a_m: 0.0
      alpha_rad: -1.570796  # -90°
      d_m: 0.030
      theta_offset_deg: -90

  # Geometric IK parameters
  ik:
    # Planar 2-link reach computation uses a3 as upper arm, d4 as forearm
    # Adjust if physical measurement differs
    planar_upper_arm_m: 0.125    # a3
    planar_forearm_m: 0.090      # d4

    # J5 wrist pitch compensation
    # Keeps gripper pointing downward during reach
    # Formula: theta5 ≈ -(theta2 + theta3) + offset_deg
    # Sign and offset must be calibrated on physical robot
    j5_pitch_compensation:
      enabled: true
      base_formula: "-(theta2 + theta3)"
      offset_deg: null           # fill after physical calibration
      # If base formula doesn't work, try: theta5 ≈ theta2 + theta3 + offset

    # Workspace limits (meters, from base origin)
    workspace:
      max_horizontal_m: 0.35      # max radial distance from base center
      min_z_m: 0.02               # minimum height above board
      max_z_m: 0.30               # maximum height

  # DH frame axis conventions (for FK visualization)
  # z axis of each DH frame follows the physical joint rotation axis
  frame_conventions:
    frame_0:
      origin: "base center, base rotation axis"
      z_axis: "vertical, aligned with J1 yaw axis"
    frame_1:
      origin: "shoulder pivot"
      z_axis: "horizontal, aligned with J2 pitch axis"
    frame_2:
      origin: "elbow pivot"
      z_axis: "horizontal, aligned with J3 pitch axis"
    frame_3:
      origin: "wrist yaw pivot"
      z_axis: "horizontal, aligned with J4 yaw axis"
    frame_4:
      origin: "wrist pitch pivot"
      z_axis: "horizontal, aligned with J5 pitch axis"
    frame_5:
      origin: "TCP (tool center point)"
      z_axis: "normal to gripper fingers"

  # Validation status
  calibration_status:
    dh_parameters: uncalibrated   # uncalibrated | partially_calibrated | calibrated
    last_updated: null
    notes: "Baseline from uas.docx. Validate all link lengths against physical robot."