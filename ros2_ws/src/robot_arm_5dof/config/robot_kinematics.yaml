# Robot kinematics configuration for robot_arm_5dof
#
# Phase 5 status:
#   Dry-run IK and pose planning only.
#   No serial, no ESP32, no servo commands, no robot motion.
#
# Physical joint mapping for this provisional IK dry run:
#   CH1/J1 = base yaw
#   CH2/J2 = shoulder pitch
#   CH3/J3 = elbow pitch
#   CH4/J4 = wrist yaw / wrist rotate
#   CH5/J5 = wrist pitch / gripper up-down
#   CH6    = gripper open-close, not part of IK chain

robot:
  dof: 5
  units: meter
  status: provisional_manual_measurement
  dry_run_only: true
  note: link lengths, servo directions, wrist compensation, and yaw offset must be physically validated before motion

links:
  board_to_shoulder_height_m: 0.100
  shoulder_to_elbow_m: 0.125
  elbow_to_wrist_rotate_m: 0.090
  wrist_rotate_to_wrist_pitch_m: 0.030
  wrist_pitch_to_tcp_m: 0.125
  effective_wrist_to_tcp_m: 0.155

ik:
  method: planar_geometric_dry_run
  base_axis: z
  shoulder_elbow_plane: vertical
  tcp_offset_mode: vertical_down
  tcp_offset_modes_supported:
    - none
    - planar
    - vertical_down
    - mixed
  tcp_planar_fraction: 0.0
  tcp_vertical_fraction: 1.0
  note: vertical_down is provisional; validate physically before motion
  wrist_yaw_ch4_default: neutral
  wrist_pitch_ch5_compensation_enabled: true
  wrist_pitch_ch5_compensation_note: CH5 is physical wrist pitch; sign and offset must be validated before motion
  default_tcp_pitch_down: true

servo_model:
  # Provisional IK dry-run convention only.
  # Do not treat these direction/offset values as physical servo calibration
  # until they are validated with hardware.
  ch1_base_yaw:
    zero_reference_deg: 90
    direction: 1
    offset_deg: 0
  ch2_shoulder_pitch:
    zero_reference_deg: 130
    direction: 1
    offset_deg: -90
  ch3_elbow_pitch:
    zero_reference_deg: 130
    direction: 1
    offset_deg: 0
  ch4_wrist_yaw:
    zero_reference_deg: 95
    direction: 1
    offset_deg: 0
  ch5_wrist_pitch:
    zero_reference_deg: 60
    direction: 1
    offset_deg: 0

safety:
  reject_if_outside_servo_limits: true
  reject_if_unreachable: true
  dry_run_only: true
  no_serial: true
  no_hardware_motion: true

dh_modified_baseline:
  source: uas_docx
  status: reference_only_not_final
  note: baseline for FK/documentation; physical link measurements in links section are used for Phase 5 dry-run IK
  table:
    - link: 1
      a_m: 0.0
      alpha_rad: 0.0
      d_m: 0.050
      theta_offset_deg: 0
    - link: 2
      a_m: 0.0
      alpha_rad: 1.570796
      d_m: 0.055
      theta_offset_deg: 90
    - link: 3
      a_m: 0.125
      alpha_rad: -3.141593
      d_m: 0.0
      theta_offset_deg: -90
    - link: 4
      a_m: 0.0
      alpha_rad: 1.570796
      d_m: 0.090
      theta_offset_deg: 0
    - link: 5
      a_m: 0.0
      alpha_rad: -1.570796
      d_m: 0.030
      theta_offset_deg: -90

frame_conventions:
  status: reference_only
  note: z axis of each DH frame follows the physical joint rotation axis
  chain:
    - frame: 0
      origin: base center
      joint: CH1/J1 base yaw
      z_axis: vertical base yaw axis
    - frame: 1
      origin: shoulder pitch axis
      joint: CH2/J2 shoulder pitch
      z_axis: physical shoulder pitch rotation axis
    - frame: 2
      origin: elbow pitch axis
      joint: CH3/J3 elbow pitch
      z_axis: physical elbow pitch rotation axis
    - frame: 3
      origin: wrist yaw / wrist rotate axis
      joint: CH4/J4 wrist yaw / wrist rotate
      z_axis: physical wrist yaw rotation axis
    - frame: 4
      origin: wrist pitch / gripper up-down axis
      joint: CH5/J5 wrist pitch / gripper up-down
      z_axis: physical wrist pitch rotation axis
    - frame: 5
      origin: TCP / tool center point
      joint: tool frame
      z_axis: tool frame axis, not a gripper servo axis
  gripper:
    channel: CH6
    role: gripper open-close actuator
    in_dh_chain: false
